<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade Predictor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-glow"></div>

    <div class="container">
        <div class="card">
            <div class="badge">Free Tool</div>

            <div class="header">
                <div class="icon">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                        <path d="M2 17l10 5 10-5"/>
                        <path d="M2 12l10 5 10-5"/>
                    </svg>
                </div>
                <h1>Grade Predictor</h1>
                <p>Predict your score instantly</p>
            </div>

            <div class="inputs">
                <input type="number" id="studyHours" placeholder="Study Hours/Day (e.g. 3)">
                <input type="number" id="attendance" placeholder="Attendance % (e.g. 85)">
                <input type="number" id="assignments" placeholder="Assignments % (e.g. 90)">
                <input type="number" id="previousMarks" placeholder="Previous Marks % (e.g. 75)">
            </div>

            <button id="predictBtn">Predict My Grade →</button>

            <div id="result" class="result-area">
                <p class="placeholder">Your result will appear here</p>
            </div>

            <div class="stats">
                <div><span>50K+</span><small>Students</small></div>
                <div><span>95%</span><small>Accuracy</small></div>
                <div><span>Free</span><small>Forever</small></div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('predictBtn').addEventListener('click', function() {
            // Get values
            var studyHours = parseFloat(document.getElementById('studyHours').value) || 0;
            var attendance = parseFloat(document.getElementById('attendance').value) || 0;
            var assignments = parseFloat(document.getElementById('assignments').value) || 0;
            var previousMarks = parseFloat(document.getElementById('previousMarks').value) || 0;

            // Check if any input
            if (studyHours === 0 && attendance === 0 && assignments === 0 && previousMarks === 0) {
                document.getElementById('result').innerHTML = '<p class="error">Please enter at least one value</p>';
                return;
            }

            // Calculate score
            var score = (studyHours * 4.5) + (attendance * 0.30) + (assignments * 0.30) + (previousMarks * 0.50);
            score = Math.min(Math.round(score), 100);

            // Grade and category
            var grade, category;
            if (score >= 85) { grade = 'A'; category = 'Outstanding'; }
            else if (score >= 70) { grade = 'B'; category = 'Great Job'; }
            else if (score >= 55) { grade = 'C'; category = 'Good'; }
            else { grade = 'F'; category = 'Keep Trying'; }

            // Status
            var status;
            if (score >= 85) status = 'Excellent';
            else if (score >= 70) status = 'Good';
            else if (score >= 55) status = 'Fair';
            else status = 'Needs Work';

            // Output
            document.getElementById('result').innerHTML =
                '<div class="result-box">' +
                '<div class="grade">' + grade + '</div>' +
                '<div class="category">' + category + '</div>' +
                '<div class="score-info">' +
                '<div><span>SCORE</span><strong>' + score + '%</strong></div>' +
                '<div><span>STATUS</span><strong>' + status + '</strong></div>' +
                '</div>' +
                '</div>';
        });
    </script>
</body>
</html>
